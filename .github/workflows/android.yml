name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android TV WebView project
        run: |
          rm -rf app
          mkdir -p app/src/main/java/com/bongdatv/app
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "BongDaTV"
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.6.1' apply false
          }
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.bongdatv.app'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.bongdatv.app'
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowBackground">#000000</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/drawable/ic_launcher.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#0B0B0B"
                  android:pathData="M0,0h108v108h-108z" />
              <path
                  android:fillColor="#00E676"
                  android:pathData="M54,18a36,36 0,1 0,0.1 0M54,30a24,24 0,1 1,-0.1 0" />
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M46,42h16v24h-16z" />
          </vector>
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.INTERNET" />

              <uses-feature
                  android:name="android.software.leanback"
                  android:required="false" />

              <uses-feature
                  android:name="android.hardware.touchscreen"
                  android:required="false" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="BongDaTV"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="keyboard|keyboardHidden|orientation|screenSize">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                      </intent-filter>

                  </activity>

              </application>

          </manifest>
          EOF

          cat > app/src/main/java/com/bongdatv/app/MainActivity.java <<'EOF'
          package com.bongdatv.app;

          import android.app.Activity;
          import android.os.Bundle;
          import android.view.Gravity;
          import android.view.View;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.TextView;

          import org.json.JSONObject;

          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.net.HttpURLConnection;
          import java.net.URL;

          public class MainActivity extends Activity {

              private WebView webView;

              private static final String CONFIG_URL =
                      "https://raw.githubusercontent.com/sslavangroi-blip/BongdaTV/main/channels.json";

              private static final String DEFAULT_URL =
                      "https://example.com/";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  enableFullScreen();
                  showLoadingScreen();
                  loadConfigAndOpenWebsite();
              }

              private void showLoadingScreen() {
                  TextView loadingText = new TextView(this);
                  loadingText.setText("Đang tải...");
                  loadingText.setTextSize(32);
                  loadingText.setTextColor(0xFFFFFFFF);
                  loadingText.setGravity(Gravity.CENTER);
                  loadingText.setBackgroundColor(0xFF000000);
                  setContentView(loadingText);
              }

              private void loadConfigAndOpenWebsite() {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          String targetUrl = DEFAULT_URL;

                          try {
                              String jsonText = downloadText(CONFIG_URL + "?t=" + System.currentTimeMillis());
                              JSONObject jsonObject = new JSONObject(jsonText);
                              targetUrl = jsonObject.optString("url", DEFAULT_URL);
                          } catch (Exception e) {
                              targetUrl = DEFAULT_URL;
                          }

                          final String finalUrl = targetUrl;

                          runOnUiThread(new Runnable() {
                              @Override
                              public void run() {
                                  openWebsite(finalUrl);
                              }
                          });
                      }
                  }).start();
              }

              private String downloadText(String urlString) throws Exception {
                  URL url = new URL(urlString);
                  HttpURLConnection connection = (HttpURLConnection) url.openConnection();

                  connection.setRequestMethod("GET");
                  connection.setConnectTimeout(10000);
                  connection.setReadTimeout(10000);
                  connection.setUseCaches(false);

                  InputStream inputStream = connection.getInputStream();
                  BufferedReader reader = new BufferedReader(new InputStreamReader(inputStream));

                  StringBuilder builder = new StringBuilder();
                  String line;

                  while ((line = reader.readLine()) != null) {
                      builder.append(line);
                  }

                  reader.close();
                  inputStream.close();
                  connection.disconnect();

                  return builder.toString();
              }

              private void openWebsite(String url) {
                  enableFullScreen();

                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  settings.setSupportZoom(false);
                  settings.setBuiltInZoomControls(false);
                  settings.setDisplayZoomControls(false);

                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl(url);
              }

              private void enableFullScreen() {
                  getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                                  | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                                  | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                                  | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                  );
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      enableFullScreen();
                  }
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BongDaTV-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
